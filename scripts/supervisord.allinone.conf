; ============================================================================
; TTC 4-Pipeline All-in-One — supervisord 프로세스 매니페스트
; 단일 컨테이너에서 11개 프로세스 관리 (기존 offline 10개 + SonarQube 추가).
;
; 포트 체계 (기존 Playwright 컨테이너 18080/18081/50001 와 분리):
;   28080 Jenkins HTTP
;   50002 Jenkins agent (JNLP)
;   28081 nginx → Dify gateway
;   29000 SonarQube HTTP
;   5432/6379/6333/5001/5002/3000 은 컨테이너 내부 전용 (호스트 미노출)
;
; 기동 순서:
;   100: postgresql, redis, qdrant                (상태 저장소)
;   150: sonarqube                                (PG 이후, Jenkins 전)
;   200: dify-plugin-daemon
;   300: dify-api / worker / worker_beat / web
;   400: nginx
;   500: jenkins
;
; 로그는 /data/logs/<svc>.log (볼륨 지속).
; ============================================================================

[supervisord]
nodaemon=true
user=root
logfile=/data/logs/supervisord.log
pidfile=/var/run/supervisord.pid
loglevel=info

[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

; ────────────────────────────────────────────────────────────────────────────
; 상태 저장소 (priority 100)
; ────────────────────────────────────────────────────────────────────────────

[program:postgresql]
command=/usr/lib/postgresql/15/bin/postgres -D /data/pg -c config_file=/data/pg/postgresql.conf
user=postgres
priority=100
autostart=true
autorestart=unexpected
stdout_logfile=/data/logs/postgresql.log
stderr_logfile=/data/logs/postgresql.err.log
stdout_logfile_maxbytes=50MB
stderr_logfile_maxbytes=50MB

[program:redis]
command=/usr/bin/redis-server --dir /data/redis --appendonly yes --bind 127.0.0.1 --port 6379
user=redis
priority=100
autostart=true
autorestart=unexpected
stdout_logfile=/data/logs/redis.log
stderr_logfile=/data/logs/redis.err.log

[program:qdrant]
command=/usr/local/bin/qdrant
environment=
    QDRANT__SERVICE__HTTP_PORT="6333",
    QDRANT__SERVICE__HOST="127.0.0.1",
    QDRANT__STORAGE__STORAGE_PATH="/data/qdrant",
    QDRANT__STORAGE__SNAPSHOTS_PATH="/data/qdrant/snapshots",
    QDRANT__TELEMETRY_DISABLED="true"
priority=100
autostart=true
autorestart=unexpected
stdout_logfile=/data/logs/qdrant.log
stderr_logfile=/data/logs/qdrant.err.log

; ────────────────────────────────────────────────────────────────────────────
; SonarQube (priority 150) — 파이프라인 2 정적분석 엔진
; 내장 Elasticsearch 가 vm.max_map_count >= 262144 을 기본 요구하나,
; sonar.es.bootstrap.checks.disable=true (Dockerfile 에서 삽입) 로 우회.
; PG 는 127.0.0.1:5432/sonar 를 사용 (pg-init 에서 생성).
; ────────────────────────────────────────────────────────────────────────────

[program:sonarqube]
command=/opt/sonarqube/bin/sonar.sh console
directory=/opt/sonarqube
user=sonar
priority=150
autostart=false
autorestart=unexpected
startsecs=60
stopwaitsecs=60
environment=
    SONAR_JDBC_URL="jdbc:postgresql://127.0.0.1:5432/sonar",
    SONAR_JDBC_USERNAME="sonar",
    SONAR_JDBC_PASSWORD="sonar",
    SONAR_WEB_PORT="9000",
    SONAR_WEB_HOST="0.0.0.0",
    SONAR_SEARCH_JAVAADDITIONALOPTS="-Dnode.store.allow_mmap=false"
stdout_logfile=/data/logs/sonarqube.log
stderr_logfile=/data/logs/sonarqube.err.log

; sonar.sh console 은 기본 :9000 에 바인딩. 호스트 29000 매핑은 docker run/compose 에서.

