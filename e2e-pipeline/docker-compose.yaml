# =============================================================================
# DSCORE Zero-Touch QA — 완전 독립 E2E 자동화 스택
#
# Jenkins + Dify(LLM 워크플로우) + Ollama(LLM 엔진) + Playwright(E2E 실행)
# 이 파일이 있는 폴더(e2e-pipeline/)가 독립 실행 단위다.
# 외부 프로젝트 파일에 의존하지 않는다.
#
# 시작: docker compose up -d  (e2e-pipeline/ 폴더 안에서 실행)
# 중지: docker compose down
#
# 포트 (기존 DevOps 스택과 충돌 방지):
#   Jenkins  → 호스트 18080
#   Dify 콘솔 → 호스트 18081
# =============================================================================

networks:
  e2e-net:
    driver: bridge
    name: e2e-net   # Docker Compose 프로젝트 prefix 방지 — e2e-net 이름을 고정한다

volumes:
  e2e-jenkins-home:
  e2e-dify-db:
  e2e-dify-redis:
  e2e-dify-storage:
  e2e-qdrant:
  e2e-ollama:

services:

  # ============================================================
  # Jenkins — CI 파이프라인 컨트롤러 (Dockerfile.jenkins 재사용)
  # mac-ui-tester 에이전트가 Playwright 를 직접 실행하므로
  # Jenkins 컨트롤러에 Docker CLI 는 불필요하다.
  # ============================================================
  jenkins:
    build:
      context: .                               # e2e-pipeline/ 폴더가 빌드 컨텍스트
      dockerfile: Dockerfile.jenkins           # e2e-pipeline/Dockerfile.jenkins
    image: dscore/jenkins-e2e:latest
    container_name: e2e-jenkins
    restart: unless-stopped
    user: root
    ports:
      - "18080:8080"    # 기존 Jenkins(8080) 와 충돌 방지
      - "50001:50000"
    volumes:
      - e2e-jenkins-home:/var/jenkins_home
      - .:/var/jenkins_home/scripts            # e2e-pipeline/ 전체 마운트 (zero_touch_qa 포함)
    networks:
      - e2e-net
    environment:
      TZ: Asia/Seoul
      # JAVA_OPTS 는 의도적으로 설정하지 않음
      # runSetupWizard=false 를 설정하면 Setup Wizard 가 뜨지 않아
      # 가이드 §8.1 의 초기 비밀번호/플러그인 설치 절차와 충돌한다

  # ============================================================
  # Ollama — 로컬 LLM 엔진
  # Dify 콘솔에서 공급자 등록: http://ollama:11434
  # 모델 Pull: docker exec e2e-ollama ollama pull <모델명>
  # ============================================================
  ollama:
    image: ollama/ollama:latest
    container_name: e2e-ollama
    restart: unless-stopped
    volumes:
      - e2e-ollama:/root/.ollama
    networks:
      - e2e-net
    environment:
      OLLAMA_HOST: "0.0.0.0"
    # GPU 사용 환경 (RTX 4070 등):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ============================================================
  # Qdrant — Dify 벡터 스토어
  # ============================================================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: e2e-qdrant
    restart: unless-stopped
    volumes:
      - e2e-qdrant:/qdrant/storage
    networks:
      - e2e-net

  # ============================================================
  # Dify 데이터베이스 (PostgreSQL)
  # ============================================================
  dify-db:
    image: postgres:15-alpine
    container_name: e2e-dify-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: dify
      POSTGRES_PASSWORD: difyai123456
      POSTGRES_DB: dify
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - e2e-dify-db:/var/lib/postgresql/data
    networks:
      - e2e-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dify"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ============================================================
  # Dify Redis (캐시 + Celery 브로커)
  # ============================================================
  dify-redis:
    image: redis:6-alpine
    container_name: e2e-dify-redis
    restart: unless-stopped
    command: redis-server --requirepass difyai123456
    volumes:
      - e2e-dify-redis:/data
    networks:
      - e2e-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "difyai123456", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ============================================================
  # Dify Sandbox — 코드 실행 격리 환경
  # ============================================================
  dify-sandbox:
    image: langgenius/dify-sandbox:0.2.10
    container_name: e2e-dify-sandbox
    restart: unless-stopped
    networks:
      - e2e-net
    environment:
      API_KEY: dify-sandbox-api-key
      GIN_MODE: release
      WORKER_TIMEOUT: 15
      ENABLE_NETWORK: "true"
      SANDBOX_PORT: 8194

  # ============================================================
  # Dify API 서버
  # zero_touch_qa DifyClient 가 호출: http://api:5001/v1
  #   /v1/files/upload       (Doc 모드)
  #   /v1/chat-messages      (시나리오 생성 / 자가치유)
  # ============================================================
  api:
    image: langgenius/dify-api:latest
    container_name: e2e-dify-api
    restart: unless-stopped
    depends_on:
      dify-db:
        condition: service_healthy
      dify-redis:
        condition: service_healthy
    networks:
      - e2e-net
    volumes:
      - e2e-dify-storage:/app/api/storage
    environment:
      MODE: api
      SECRET_KEY: "sk-e2e-zero-touch-qa-secret-change-me"
      INIT_PASSWORD: "admin1234"
      # DB
      DB_USERNAME: dify
      DB_PASSWORD: difyai123456
      DB_HOST: dify-db
      DB_PORT: 5432
      DB_DATABASE: dify
      # Redis
      REDIS_HOST: dify-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: difyai123456
      REDIS_USE_SSL: "false"
      CELERY_BROKER_URL: "redis://:difyai123456@dify-redis:6379/1"
      # 스토리지
      STORAGE_TYPE: local
      STORAGE_LOCAL_PATH: /app/api/storage
      # 벡터 스토어
      VECTOR_STORE: qdrant
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ""
      # 샌드박스
      CODE_EXECUTION_ENDPOINT: http://dify-sandbox:8194
      CODE_MAX_ACTIVE_REQUESTS: 50
      CONSOLE_WEB_URL: ""
      CONSOLE_API_URL: ""
      SERVICE_API_URL: ""
      APP_WEB_URL: ""
      FILES_URL: ""

  # ============================================================
  # Dify Worker — Celery 백그라운드 작업 처리
  # ============================================================
  worker:
    image: langgenius/dify-api:latest
    container_name: e2e-dify-worker
    restart: unless-stopped
    depends_on:
      dify-db:
        condition: service_healthy
      dify-redis:
        condition: service_healthy
    networks:
      - e2e-net
    volumes:
      - e2e-dify-storage:/app/api/storage
    environment:
      MODE: worker
      SECRET_KEY: "sk-e2e-zero-touch-qa-secret-change-me"
      DB_USERNAME: dify
      DB_PASSWORD: difyai123456
      DB_HOST: dify-db
      DB_PORT: 5432
      DB_DATABASE: dify
      REDIS_HOST: dify-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: difyai123456
      REDIS_USE_SSL: "false"
      CELERY_BROKER_URL: "redis://:difyai123456@dify-redis:6379/1"
      STORAGE_TYPE: local
      STORAGE_LOCAL_PATH: /app/api/storage
      VECTOR_STORE: qdrant
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ""
      CODE_EXECUTION_ENDPOINT: http://dify-sandbox:8194

  # ============================================================
  # Dify Web — 프론트엔드 콘솔 (Chatflow 등록, 초기 설정)
  # ============================================================
  dify-web:
    image: langgenius/dify-web:latest
    container_name: e2e-dify-web
    restart: unless-stopped
    networks:
      - e2e-net
    environment:
      CONSOLE_API_URL: ""
      APP_API_URL: ""
      NEXT_TELEMETRY_DISABLED: "1"

  # ============================================================
  # Dify Nginx — api + web 통합 진입점
  # http://localhost:18081        → Dify 콘솔 (초기 설정, Chatflow 등록)
  # 컨테이너 내부: http://api:5001/v1 → DIFY_BASE_URL 로 직접 사용
  # ============================================================
  dify-nginx:
    image: nginx:alpine
    container_name: e2e-dify-nginx
    restart: unless-stopped
    ports:
      - "18081:80"
    depends_on:
      - api
      - dify-web
    networks:
      - e2e-net
    volumes:
      - ./nginx/dify.conf:/etc/nginx/conf.d/default.conf:ro
