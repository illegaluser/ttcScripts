# =============================================================================
# DSCORE Zero-Touch QA — 완전 독립 E2E 자동화 스택 (Dify 1.13.3 공식 구조 반영)
#
# 이 compose 파일은 langgenius/dify 공식 docker/docker-compose.yaml (main 브랜치)
# 구조를 기반으로 재작성되었다. 핵심 차이점:
#   - Jenkins(mac-ui-tester 에이전트 컨트롤러) 서비스 추가
#   - Ollama 컨테이너를 프로파일(container-ollama)로 선택적 기동
#   - 기본값은 호스트 설치 Ollama 사용 (host.docker.internal:11434)
#   - Vector store 는 Qdrant 로 고정 (upstream 기본 weaviate 대신)
#   - 이름 있는 볼륨 사용 (upstream 바인드 마운트 대신, Windows Docker Desktop 호환)
#   - 포트 충돌 회피: Dify 콘솔 18081, Jenkins 18080
#
# 사용법:
#   호스트 Ollama 모드(기본):
#     docker compose up -d
#   컨테이너 Ollama 모드(임베디드):
#     docker compose --profile container-ollama up -d
#
# 중지:
#   docker compose down
#
# 완전 초기화 (볼륨 포함):
#   docker compose down -v
#
# ─────────────────────────────────────────────────────────────────────────────
# [호스트 Ollama 모드의 모델 전제]
# 이 스택은 기본 기동(호스트 Ollama 모드)에서 아래 모델이 호스트에 이미
# Pull 되어 있다고 가정한다. 가이드와 dify-chatflow.yaml 도 동일 전제.
#   - qwen3.5:4b     (Planner/Healer 기본값 — JSON fidelity 위해 선택)
#   - gemma3:4b      (대안/실험용)
# 호스트 확인:  ollama list
# 호스트 Pull:  ollama pull qwen3.5:4b && ollama pull gemma3:4b
# 호스트 바인딩: OLLAMA_HOST=0.0.0.0 (기본값 127.0.0.1 이면 컨테이너에서 못 닿음)
# ─────────────────────────────────────────────────────────────────────────────
#
# upstream 참조: https://github.com/langgenius/dify/blob/main/docker/docker-compose.yaml
# =============================================================================

# ─────────────────────────────────────────────────────────────────────────────
# api / worker / worker_beat / plugin_daemon 가 공통으로 사용하는 환경변수 앵커
# upstream 의 x-shared-api-worker-env 블록에서 본 스택이 실제로 사용하는
# 필수 항목만 추려 복제했다. 추가 튜닝이 필요하면 upstream 원본을 참조해 확장한다.
# ─────────────────────────────────────────────────────────────────────────────
x-shared-env: &shared-api-worker-env
  # ── 공통/로깅 ──
  LANG: ${LANG:-C.UTF-8}
  LC_ALL: ${LC_ALL:-C.UTF-8}
  PYTHONIOENCODING: ${PYTHONIOENCODING:-utf-8}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  LOG_OUTPUT_FORMAT: ${LOG_OUTPUT_FORMAT:-text}
  DEBUG: ${DEBUG:-false}
  FLASK_DEBUG: ${FLASK_DEBUG:-false}
  DEPLOY_ENV: ${DEPLOY_ENV:-PRODUCTION}
  SECRET_KEY: ${SECRET_KEY:-sk-e2e-zero-touch-qa-secret-change-me}
  # 마이그레이션 자동 실행 (이 플래그가 없으면 첫 기동 시 dify_setups 테이블이 없어 500 발생)
  MIGRATION_ENABLED: ${MIGRATION_ENABLED:-true}

  # ── 서버 ──
  DIFY_BIND_ADDRESS: ${DIFY_BIND_ADDRESS:-0.0.0.0}
  DIFY_PORT: ${DIFY_PORT:-5001}
  SERVER_WORKER_AMOUNT: ${SERVER_WORKER_AMOUNT:-1}
  SERVER_WORKER_CLASS: ${SERVER_WORKER_CLASS:-gevent}
  SERVER_WORKER_CONNECTIONS: ${SERVER_WORKER_CONNECTIONS:-10}
  GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-360}
  CELERY_WORKER_AMOUNT: ${CELERY_WORKER_AMOUNT:-4}
  CELERY_AUTO_SCALE: ${CELERY_AUTO_SCALE:-false}

  # ── URL 세팅 (nginx 경유) ──
  CONSOLE_API_URL: ${CONSOLE_API_URL:-}
  CONSOLE_WEB_URL: ${CONSOLE_WEB_URL:-}
  SERVICE_API_URL: ${SERVICE_API_URL:-}
  APP_API_URL: ${APP_API_URL:-}
  APP_WEB_URL: ${APP_WEB_URL:-}
  FILES_URL: ${FILES_URL:-}
  CHECK_UPDATE_URL: ${CHECK_UPDATE_URL:-https://updates.dify.ai}

  # ── DB (PostgreSQL) ──
  DB_TYPE: ${DB_TYPE:-postgresql}
  DB_USERNAME: ${DB_USERNAME:-postgres}
  DB_PASSWORD: ${DB_PASSWORD:-difyai123456}
  DB_HOST: ${DB_HOST:-db_postgres}
  DB_PORT: ${DB_PORT:-5432}
  DB_DATABASE: ${DB_DATABASE:-dify}
  DB_PLUGIN_DATABASE: ${DB_PLUGIN_DATABASE:-dify_plugin}
  SQLALCHEMY_POOL_SIZE: ${SQLALCHEMY_POOL_SIZE:-30}
  SQLALCHEMY_POOL_RECYCLE: ${SQLALCHEMY_POOL_RECYCLE:-3600}

  # ── Redis ──
  REDIS_HOST: ${REDIS_HOST:-redis}
  REDIS_PORT: ${REDIS_PORT:-6379}
  REDIS_PASSWORD: ${REDIS_PASSWORD:-difyai123456}
  REDIS_USE_SSL: ${REDIS_USE_SSL:-false}
  REDIS_DB: ${REDIS_DB:-0}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://:difyai123456@redis:6379/1}
  CELERY_BACKEND: ${CELERY_BACKEND:-redis}

  # ── 스토리지 (OpenDAL 로컬 파일시스템) ──
  STORAGE_TYPE: ${STORAGE_TYPE:-opendal}
  OPENDAL_SCHEME: ${OPENDAL_SCHEME:-fs}
  OPENDAL_FS_ROOT: ${OPENDAL_FS_ROOT:-storage}

  # ── 벡터 스토어 (Qdrant 로 고정) ──
  VECTOR_STORE: ${VECTOR_STORE:-qdrant}
  QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
  QDRANT_API_KEY: ${QDRANT_API_KEY:-difyai123456}
  QDRANT_CLIENT_TIMEOUT: ${QDRANT_CLIENT_TIMEOUT:-20}
  QDRANT_GRPC_ENABLED: ${QDRANT_GRPC_ENABLED:-false}
  QDRANT_GRPC_PORT: ${QDRANT_GRPC_PORT:-6334}

  # ── 코드 실행 (Sandbox) ──
  CODE_EXECUTION_ENDPOINT: ${CODE_EXECUTION_ENDPOINT:-http://sandbox:8194}
  CODE_EXECUTION_API_KEY: ${CODE_EXECUTION_API_KEY:-dify-sandbox}
  CODE_MAX_ACTIVE_REQUESTS: ${CODE_MAX_ACTIVE_REQUESTS:-50}

  # ── Sandbox 자체 환경변수 (sandbox 서비스에서 참조) ──
  SANDBOX_API_KEY: ${SANDBOX_API_KEY:-dify-sandbox}
  SANDBOX_GIN_MODE: ${SANDBOX_GIN_MODE:-release}
  SANDBOX_WORKER_TIMEOUT: ${SANDBOX_WORKER_TIMEOUT:-15}
  SANDBOX_ENABLE_NETWORK: ${SANDBOX_ENABLE_NETWORK:-true}
  SANDBOX_HTTP_PROXY: ${SANDBOX_HTTP_PROXY:-http://ssrf_proxy:3128}
  SANDBOX_HTTPS_PROXY: ${SANDBOX_HTTPS_PROXY:-http://ssrf_proxy:3128}
  SANDBOX_PORT: ${SANDBOX_PORT:-8194}

  # ── SSRF Proxy ──
  SSRF_PROXY_HTTP_URL: ${SSRF_PROXY_HTTP_URL:-http://ssrf_proxy:3128}
  SSRF_PROXY_HTTPS_URL: ${SSRF_PROXY_HTTPS_URL:-http://ssrf_proxy:3128}
  SSRF_HTTP_PORT: ${SSRF_HTTP_PORT:-3128}
  SSRF_COREDUMP_DIR: ${SSRF_COREDUMP_DIR:-/var/spool/squid}
  SSRF_REVERSE_PROXY_PORT: ${SSRF_REVERSE_PROXY_PORT:-8194}
  SSRF_SANDBOX_HOST: ${SSRF_SANDBOX_HOST:-sandbox}

  # ── 플러그인 시스템 (api ↔ plugin_daemon 연결) ──
  PLUGIN_DAEMON_URL: ${PLUGIN_DAEMON_URL:-http://plugin_daemon:5002}
  PLUGIN_DAEMON_KEY: ${PLUGIN_DAEMON_KEY:-lYkiYYT6owG+71oLerGzA7GXCgOT++6ovaezWAjpCjf+Sjc3ZtU+qUEi}
  PLUGIN_MAX_PACKAGE_SIZE: ${PLUGIN_MAX_PACKAGE_SIZE:-52428800}
  PLUGIN_DAEMON_TIMEOUT: ${PLUGIN_DAEMON_TIMEOUT:-600.0}
  PLUGIN_REMOTE_INSTALL_HOST: ${EXPOSE_PLUGIN_DEBUGGING_HOST:-localhost}
  PLUGIN_REMOTE_INSTALL_PORT: ${EXPOSE_PLUGIN_DEBUGGING_PORT:-5003}
  PLUGIN_DIFY_INNER_API_URL: ${PLUGIN_DIFY_INNER_API_URL:-http://api:5001}
  PLUGIN_DIFY_INNER_API_KEY: ${PLUGIN_DIFY_INNER_API_KEY:-QaHbTe77CtuXmsfyhR7+vRjI/+XbV1AaFy691iy+kGDv2Jvy0/eAh8Y1}
  INNER_API_KEY_FOR_PLUGIN: ${PLUGIN_DIFY_INNER_API_KEY:-QaHbTe77CtuXmsfyhR7+vRjI/+XbV1AaFy691iy+kGDv2Jvy0/eAh8Y1}
  MARKETPLACE_ENABLED: ${MARKETPLACE_ENABLED:-true}
  MARKETPLACE_API_URL: ${MARKETPLACE_API_URL:-https://marketplace.dify.ai}
  FORCE_VERIFYING_SIGNATURE: ${FORCE_VERIFYING_SIGNATURE:-true}
  ENDPOINT_URL_TEMPLATE: ${ENDPOINT_URL_TEMPLATE:-http://localhost/e/{hook_id}}

  # ── 기타 리소스 한계/기본값 ──
  INDEXING_MAX_SEGMENTATION_TOKENS_LENGTH: ${INDEXING_MAX_SEGMENTATION_TOKENS_LENGTH:-4000}
  UPLOAD_FILE_SIZE_LIMIT: ${UPLOAD_FILE_SIZE_LIMIT:-15}
  UPLOAD_FILE_BATCH_LIMIT: ${UPLOAD_FILE_BATCH_LIMIT:-5}
  WORKFLOW_MAX_EXECUTION_STEPS: ${WORKFLOW_MAX_EXECUTION_STEPS:-500}
  WORKFLOW_MAX_EXECUTION_TIME: ${WORKFLOW_MAX_EXECUTION_TIME:-1200}

  # ── 권한 검증 비활성 (로컬 dev) ──
  WEB_API_CORS_ALLOW_ORIGINS: ${WEB_API_CORS_ALLOW_ORIGINS:-*}
  CONSOLE_CORS_ALLOW_ORIGINS: ${CONSOLE_CORS_ALLOW_ORIGINS:-*}

networks:
  # 기본 네트워크 — 모든 서비스가 참여
  e2e-net:
    driver: bridge
    name: e2e-net
  # ssrf_proxy 전용 내부 네트워크 — sandbox 외부 트래픽이 squid 를 거치도록 격리
  ssrf_proxy_network:
    driver: bridge
    internal: true

volumes:
  e2e-jenkins-home:
  e2e-dify-db:
  e2e-dify-redis:
  e2e-dify-storage:
  e2e-dify-plugin:
  e2e-dify-sandbox-deps:
  e2e-qdrant:
  e2e-ollama:

services:

  # ============================================================
  # Jenkins — CI 파이프라인 컨트롤러 (Dockerfile.jenkins 로 이미지 빌드)
  # mac-ui-tester 에이전트는 호스트에서 JNLP 로 접속해 Playwright 를 직접 실행.
  # Jenkins 컨트롤러 컨테이너 자체에는 Docker CLI 가 불필요하다.
  # ============================================================
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    image: dscore/jenkins-e2e:latest
    container_name: e2e-jenkins
    restart: unless-stopped
    user: root
    ports:
      - "18080:8080"
      - "50000:50000"
    volumes:
      - e2e-jenkins-home:/var/jenkins_home
      - .:/var/jenkins_home/scripts
    networks:
      - e2e-net
    environment:
      TZ: Asia/Seoul

  # ============================================================
  # init_permissions — 볼륨 소유권 초기화 (upstream 패턴 반영)
  # Docker named volume 기본값(root:root)을 dify 사용자(uid 1001) 로 변환.
  # FLAG_FILE 로 멱등 처리 — 이미 초기화된 볼륨에는 skip.
  # api / worker / worker_beat / plugin_daemon 가 depends_on 으로 기다린다.
  # ============================================================
  init_permissions:
    image: busybox:latest
    container_name: e2e-dify-init-permissions
    user: "0:0"
    command:
      - sh
      - -c
      - |
        set -e
        for TARGET in /app/api/storage /app/plugin/storage; do
          FLAG="$${TARGET}/.init_permissions"
          if [ -f "$${FLAG}" ]; then
            echo "[init] $${TARGET} already initialized, skipping."
            continue
          fi
          echo "[init] fixing ownership on $${TARGET}"
          mkdir -p "$${TARGET}"
          chown -R 1001:1001 "$${TARGET}"
          touch "$${FLAG}"
        done
        echo "[init] done"
    volumes:
      - e2e-dify-storage:/app/api/storage
      - e2e-dify-plugin:/app/plugin/storage
    network_mode: none
    restart: "no"

  # ============================================================
  # db_postgres — PostgreSQL (dify + dify_plugin 2개 데이터베이스)
  # ./postgres-init/*.sql 은 첫 기동 시 자동 실행되어 dify_plugin DB 를 생성한다.
  # ============================================================
  db_postgres:
    image: postgres:15-alpine
    container_name: e2e-dify-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-difyai123456}
      POSTGRES_DB: ${DB_DATABASE:-dify}
      PGDATA: /var/lib/postgresql/data/pgdata
    command: >
      postgres -c 'max_connections=${POSTGRES_MAX_CONNECTIONS:-100}'
               -c 'shared_buffers=${POSTGRES_SHARED_BUFFERS:-128MB}'
               -c 'work_mem=${POSTGRES_WORK_MEM:-4MB}'
               -c 'maintenance_work_mem=${POSTGRES_MAINTENANCE_WORK_MEM:-64MB}'
               -c 'effective_cache_size=${POSTGRES_EFFECTIVE_CACHE_SIZE:-4096MB}'
    volumes:
      - e2e-dify-db:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    networks:
      - e2e-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-dify}"]
      interval: 5s
      timeout: 3s
      retries: 20

  # ============================================================
  # redis — 캐시 + Celery 브로커
  # ============================================================
  redis:
    image: redis:6-alpine
    container_name: e2e-dify-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-difyai123456}
    volumes:
      - e2e-dify-redis:/data
    networks:
      - e2e-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-difyai123456}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  # ============================================================
  # qdrant — 벡터 스토어
  # ============================================================
  qdrant:
    image: langgenius/qdrant:v1.8.3
    container_name: e2e-qdrant
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-difyai123456}
    volumes:
      - e2e-qdrant:/qdrant/storage
    networks:
      - e2e-net

  # ============================================================
  # sandbox — Dify 코드 실행 격리 환경
  # ssrf_proxy_network (internal) 에 속해 외부 네트워크 접근은
  # squid 프록시(ssrf_proxy)를 통해서만 가능하다.
  # ============================================================
  sandbox:
    image: langgenius/dify-sandbox:0.2.14
    container_name: e2e-dify-sandbox
    restart: unless-stopped
    environment:
      API_KEY: ${SANDBOX_API_KEY:-dify-sandbox}
      GIN_MODE: ${SANDBOX_GIN_MODE:-release}
      WORKER_TIMEOUT: ${SANDBOX_WORKER_TIMEOUT:-15}
      ENABLE_NETWORK: ${SANDBOX_ENABLE_NETWORK:-true}
      HTTP_PROXY: ${SANDBOX_HTTP_PROXY:-http://ssrf_proxy:3128}
      HTTPS_PROXY: ${SANDBOX_HTTPS_PROXY:-http://ssrf_proxy:3128}
      SANDBOX_PORT: ${SANDBOX_PORT:-8194}
    volumes:
      - e2e-dify-sandbox-deps:/dependencies
    networks:
      - ssrf_proxy_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8194/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # ssrf_proxy — Squid 기반 SSRF 방어 프록시
  # sandbox 의 외부 트래픽을 여기서 필터링한다 (marketplace.dify.ai 허용).
  # ssrf_proxy 는 두 네트워크(e2e-net + ssrf_proxy_network)에 조인한다.
  # ============================================================
  ssrf_proxy:
    image: ubuntu/squid:latest
    container_name: e2e-dify-ssrf-proxy
    restart: unless-stopped
    volumes:
      - ./ssrf_proxy/squid.conf.template:/etc/squid/squid.conf.template
      - ./ssrf_proxy/docker-entrypoint.sh:/docker-entrypoint-mount.sh
    entrypoint:
      - sh
      - -c
      - |
        cp /docker-entrypoint-mount.sh /docker-entrypoint.sh && \
        sed -i 's/\r$$//' /docker-entrypoint.sh && \
        chmod +x /docker-entrypoint.sh && \
        /docker-entrypoint.sh
    environment:
      HTTP_PORT: ${SSRF_HTTP_PORT:-3128}
      COREDUMP_DIR: ${SSRF_COREDUMP_DIR:-/var/spool/squid}
      REVERSE_PROXY_PORT: ${SSRF_REVERSE_PROXY_PORT:-8194}
      SANDBOX_HOST: ${SSRF_SANDBOX_HOST:-sandbox}
      SANDBOX_PORT: ${SANDBOX_PORT:-8194}
    networks:
      - e2e-net
      - ssrf_proxy_network

  # ============================================================
  # api — Dify REST API (1.13.3)
  # /console/api 와 /v1 경로의 실제 백엔드.
  # ============================================================
  api:
    image: langgenius/dify-api:1.13.3
    container_name: e2e-dify-api
    restart: unless-stopped
    environment:
      <<: *shared-api-worker-env
      MODE: api
    depends_on:
      init_permissions:
        condition: service_completed_successfully
      db_postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - e2e-net
      - ssrf_proxy_network
    # 호스트 Ollama 모드(기본)에서 host.docker.internal 해석이 필요.
    # Docker Desktop(Win/Mac) 에서는 기본 제공되어 아래 지시는 no-op,
    # Linux 에서는 host-gateway 매핑이 필수.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - e2e-dify-storage:/app/api/storage

  # ============================================================
  # worker — Celery 일반 작업 워커
  # ============================================================
  worker:
    image: langgenius/dify-api:1.13.3
    container_name: e2e-dify-worker
    restart: unless-stopped
    environment:
      <<: *shared-api-worker-env
      MODE: worker
    depends_on:
      init_permissions:
        condition: service_completed_successfully
      db_postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - e2e-net
      - ssrf_proxy_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - e2e-dify-storage:/app/api/storage

  # ============================================================
  # worker_beat — Celery Beat 스케줄러 (주기 작업)
  # upstream 은 이를 core service 로 분류한다.
  # ============================================================
  worker_beat:
    image: langgenius/dify-api:1.13.3
    container_name: e2e-dify-worker-beat
    restart: unless-stopped
    environment:
      <<: *shared-api-worker-env
      MODE: beat
    depends_on:
      init_permissions:
        condition: service_completed_successfully
      db_postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - e2e-net

  # ============================================================
  # plugin_daemon — Dify 1.x 플러그인 시스템 데몬
  # 모델 공급자(Ollama 포함)가 이 데몬에서 플러그인으로 설치/실행된다.
  # DB: dify_plugin (postgres-init 스크립트가 생성)
  # 볼륨: /app/storage 에 플러그인 venv + 패키지 + 에셋 저장
  # ============================================================
  plugin_daemon:
    image: langgenius/dify-plugin-daemon:0.5.3-local
    container_name: e2e-dify-plugin-daemon
    restart: unless-stopped
    environment:
      <<: *shared-api-worker-env
      DB_DATABASE: ${DB_PLUGIN_DATABASE:-dify_plugin}
      SERVER_PORT: 5002
      SERVER_KEY: ${PLUGIN_DAEMON_KEY:-lYkiYYT6owG+71oLerGzA7GXCgOT++6ovaezWAjpCjf+Sjc3ZtU+qUEi}
      DIFY_INNER_API_URL: http://api:5001
      DIFY_INNER_API_KEY: ${PLUGIN_DIFY_INNER_API_KEY:-QaHbTe77CtuXmsfyhR7+vRjI/+XbV1AaFy691iy+kGDv2Jvy0/eAh8Y1}
      PLUGIN_REMOTE_INSTALLING_HOST: 0.0.0.0
      PLUGIN_REMOTE_INSTALLING_PORT: 5003
      PLUGIN_WORKING_PATH: /app/storage/cwd
      FORCE_VERIFYING_SIGNATURE: ${FORCE_VERIFYING_SIGNATURE:-true}
      PYTHON_ENV_INIT_TIMEOUT: 120
      PLUGIN_MAX_EXECUTION_TIMEOUT: 600
      PLUGIN_STORAGE_TYPE: local
      PLUGIN_STORAGE_LOCAL_ROOT: /app/storage
      PLUGIN_INSTALLED_PATH: plugin
      PLUGIN_PACKAGE_CACHE_PATH: plugin_packages
      PLUGIN_MEDIA_CACHE_PATH: assets
    depends_on:
      init_permissions:
        condition: service_completed_successfully
      db_postgres:
        condition: service_healthy
    volumes:
      - e2e-dify-plugin:/app/storage
    networks:
      - e2e-net

  # ============================================================
  # web — Dify 프론트엔드 (Next.js)
  # ============================================================
  web:
    image: langgenius/dify-web:1.13.3
    container_name: e2e-dify-web
    restart: unless-stopped
    environment:
      CONSOLE_API_URL: ${CONSOLE_API_URL:-}
      APP_API_URL: ${APP_API_URL:-}
      NEXT_TELEMETRY_DISABLED: "1"
    networks:
      - e2e-net

  # ============================================================
  # nginx — api + web 통합 진입점 (호스트 18081 노출)
  # ============================================================
  nginx:
    image: nginx:alpine
    container_name: e2e-dify-nginx
    restart: unless-stopped
    ports:
      - "18081:80"
    depends_on:
      - api
      - web
    networks:
      - e2e-net
    volumes:
      - ./nginx/dify.conf:/etc/nginx/conf.d/default.conf:ro

  # ============================================================
  # ollama — 로컬 LLM 엔진 (옵션: container-ollama 프로파일 전용)
  # 기본 기동 시에는 시작되지 않는다. 호스트 Ollama 사용이 기본.
  # 사용:
  #   docker compose --profile container-ollama up -d
  # Dify 콘솔에서 Ollama 플러그인 Base URL: http://ollama:11434
  # ============================================================
  ollama:
    image: ollama/ollama:latest
    container_name: e2e-ollama
    restart: unless-stopped
    profiles:
      - container-ollama
    volumes:
      - e2e-ollama:/root/.ollama
    networks:
      - e2e-net
    environment:
      OLLAMA_HOST: "0.0.0.0"
    # GPU 사용 시 주석 해제:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
