# ============================================================================
# JMeter Performance All-in-One — nginx 설정
# 단일 컨테이너 토폴로지이므로 upstream 을 127.0.0.1 로 고정한다.
# 외부 노출은 :18090 단일 포트 (noVNC + Ollama API).
# ============================================================================

user www-data;
worker_processes auto;
error_log /data/logs/nginx-error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log /data/logs/nginx-access.log;

    sendfile on;
    keepalive_timeout 65;

    # WebSocket 업그레이드
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 18090 default_server;
        server_name _;
        client_max_body_size 100M;

        # 호스트 Ollama API proxy (디버깅용 — 호스트의 11434 로 forwarding)
        # 호스트 IP 는 entrypoint 가 /etc/hosts 의 host.docker.internal 로 설정.
        # nginx 는 startup 시 1회 resolve 하므로 호스트 IP 가 바뀌면 재기동 필요.
        location /ollama/ {
            proxy_pass http://host.docker.internal:11434/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_read_timeout 600s;
        }

        # noVNC 정적 자산 + WebSocket — JMeter Swing GUI 웹 콘솔
        # 기본 진입은 /vnc.html?autoconnect=true&resize=remote&path=websockify
        location / {
            proxy_pass http://127.0.0.1:6080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400s;
        }
    }
}
