# ============================================================================
# Zero-Touch QA All-in-One — nginx 설정
# 단일 컨테이너 토폴로지이므로 upstream 을 127.0.0.1 로 고정한다.
# (docker-compose 버전의 서비스명(api/web) DNS 해석 불필요 — resolver 제거)
# ============================================================================

# Debian trixie 의 nginx 패키지는 www-data 유저로만 실행된다 (nginx 유저 없음).
user www-data;
worker_processes auto;
error_log /data/logs/nginx-error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log /data/logs/nginx-access.log;

    sendfile on;
    keepalive_timeout 65;

    server {
        listen 18081 default_server;
        server_name _;
        client_max_body_size 100M;

        # zero_touch_qa DifyClient 가 호출하는 경로
        location /v1 {
            proxy_pass http://127.0.0.1:5001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300s;
        }

        location /console/api {
            proxy_pass http://127.0.0.1:5001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_read_timeout 300s;
        }

        location /api {
            proxy_pass http://127.0.0.1:5001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_read_timeout 300s;
        }

        location /files {
            proxy_pass http://127.0.0.1:5001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_read_timeout 300s;
            client_max_body_size 100M;
        }

        # Dify 웹 콘솔
        location / {
            proxy_pass http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
