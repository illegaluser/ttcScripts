# Docker 내장 DNS(127.0.0.11) 를 resolver 로 지정.
# proxy_pass 를 변수로 사용하면 nginx 는 설정 로드 시점이 아니라 **요청 시점**에
# 업스트림 호스트명을 재해석한다. 이로 인해 api/web 컨테이너가 재생성되며 IP 가
# 바뀌어도 nginx 재시작 없이 자동으로 새 IP 를 따라간다.
# (기존 upstream 블록은 config load 시 1회만 해석 → IP 고정으로 502 유발)
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    server_name _;
    client_max_body_size 100M;

    # zero_touch_qa DifyClient 가 호출하는 경로
    location /v1 {
        set $upstream_api http://api:5001;
        proxy_pass $upstream_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # [변경] proxy_read_timeout 300s → 1800s
        # 사유: 로컬 LLM(qwen3:8b 등)의 추론이 수 분 이상 소요될 때
        #       Nginx 가 먼저 504 Gateway Timeout 을 반환했다.
        #       Python requests 타임아웃(DIFY_TIMEOUT=1800)과 일치시켜
        #       LLM 응답 전 Nginx 가 연결을 끊는 문제를 해결했다.
        proxy_read_timeout 1800s;
    }

    location /console/api {
        set $upstream_api http://api:5001;
        proxy_pass $upstream_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        # [변경] proxy_read_timeout 300s → 1800s (위와 동일한 사유)
        proxy_read_timeout 1800s;
    }

    location /api {
        set $upstream_api http://api:5001;
        proxy_pass $upstream_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        # [변경] proxy_read_timeout 300s → 1800s (위와 동일한 사유)
        proxy_read_timeout 1800s;
    }

    location /files {
        set $upstream_api http://api:5001;
        proxy_pass $upstream_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        # [변경] proxy_read_timeout 300s → 1800s (위와 동일한 사유)
        proxy_read_timeout 1800s;
        client_max_body_size 100M;
    }

    # Dify 웹 콘솔
    location / {
        set $upstream_web http://web:3000;
        proxy_pass $upstream_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
