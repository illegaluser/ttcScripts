networks:
  devops-net:
    external: true

services:
  # ==========================================
  # 1. Langfuse용 ClickHouse (Windows 대응 단일 노드)
  # ==========================================
  clickhouse-langfuse:
    image: clickhouse/clickhouse-server:24.12
    container_name: clickhouse-langfuse
    user: "101:101"
    environment:
      CLICKHOUSE_DB: langfuse
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: langfusepassword
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    networks:
      - devops-net
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --host 127.0.0.1 --port 9000 --user default --password langfusepassword --query 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 40s
    restart: unless-stopped

  # ==========================================
  # 2. Langfuse V3 필수 인프라 (Redis & MinIO)
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: redis-langfuse
    networks:
      - devops-net
    healthcheck:                                            # 추가
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: minio-langfuse
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    entrypoint: sh                                          # 추가
    command: -c 'mkdir -p /data/langfuse && minio server --address ":9000" --console-address ":9001" /data'  # 변경
    volumes:
      - ./data/minio:/data
    networks:
      - devops-net
    healthcheck:                                            # 추가
      test: ["CMD", "mc", "ready", "local"]
      interval: 3s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # ==========================================
  # 3. Langfuse Server + PostgreSQL
  # ==========================================
  db-langfuse:
    image: postgres:15-alpine
    container_name: db-langfuse
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: langfuse
    volumes:
      - ./data/postgres-langfuse:/var/lib/postgresql/data
    networks:
      - devops-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d langfuse"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  langfuse-server:
    image: langfuse/langfuse:3                              # latest → 3
    container_name: langfuse-server
    depends_on:
      clickhouse-langfuse:
        condition: service_healthy
      db-langfuse:
        condition: service_healthy
      redis:
        condition: service_healthy                          # service_started → service_healthy
      minio:
        condition: service_healthy                          # service_started → service_healthy
    ports:
      - "3000:3000"
    environment: &langfuse-env                              # 앵커 추가 (worker 재사용)
      DATABASE_URL: "postgresql://postgres:postgrespassword@db-langfuse:5432/langfuse"
      ENCRYPTION_KEY: "66141315807908c691f148e652a926f743770335661601a4e5251c890f845a75"
      SALT: "dscore_secure_salt_2026"
      NEXTAUTH_URL: "http://localhost:3000"
      NEXTAUTH_SECRET: "dscore_super_secret_key"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      CLICKHOUSE_URL: "http://clickhouse-langfuse:8123"
      CLICKHOUSE_MIGRATION_URL: "clickhouse://clickhouse-langfuse:9000"
      CLICKHOUSE_USER: "default"
      CLICKHOUSE_PASSWORD: "langfusepassword"
      CLICKHOUSE_DB: "langfuse"
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: "langfuse"
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: "http://minio:9000"
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: "minioadmin"
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: "minioadminpassword"
      LANGFUSE_S3_EVENT_UPLOAD_REGION: "us-east-1"
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      TELEMETRY_ENABLED: "false"
    networks:
      - devops-net
    restart: unless-stopped

  langfuse-worker:
    image: langfuse/langfuse-worker:3                       # V3 필수 컨테이너
    container_name: langfuse-worker
    depends_on:
      clickhouse-langfuse:
        condition: service_healthy
      db-langfuse:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      <<: *langfuse-env                                     # langfuse-server와 동일 환경변수
    networks:
      - devops-net
    restart: unless-stopped
  # ==========================================
  # 4. DevOps Stack
  # ==========================================
  postgres-sonar:
    image: postgres:15-alpine
    container_name: postgres-sonar
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonarpassword
      POSTGRES_DB: sonar
    volumes:
      - ./data/postgres-sonar:/var/lib/postgresql/data
    networks:
      - devops-net

  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    depends_on:
      - postgres-sonar
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://postgres-sonar:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonarpassword
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    ports:
      - "9000:9000"
    volumes:
      - ./data/sonarqube/data:/opt/sonarqube/data
      - ./data/sonarqube/extensions:/opt/sonarqube/extensions
      - ./data/sonarqube/logs:/opt/sonarqube/logs
    networks:
      - devops-net

  gitlab:
    image: gitlab/gitlab-ce:18.6.2-ce.0
    container_name: gitlab
    hostname: gitlab.local
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://localhost:8929'
        gitlab_rails['gitlab_shell_ssh_port'] = 2224
        puma['worker_processes'] = 2
        sidekiq['concurrency'] = 5
        prometheus_monitoring['enable'] = false
        gitlab_rails['time_zone'] = 'Asia/Seoul'
    ports:
      - "8929:8929"
      - "2224:22"
    volumes:
      - ./data/gitlab/config:/etc/gitlab
      - ./data/gitlab/logs:/var/log/gitlab
      - ./data/gitlab/data:/var/opt/gitlab
    networks:
      - devops-net
    shm_size: "256m"

  # ==========================================
  # 5. 통합 평가 환경이 빌드된 Jenkins
  # ==========================================
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    container_name: jenkins
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - ./data/jenkins:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - devops-net
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  clickhouse_data:
  clickhouse_logs: