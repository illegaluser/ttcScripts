# ============================================================================
# TTC 4-Pipeline All-in-One — e2e-pipeline(Playwright) 연동 override
#
# 기존 e2e-pipeline/docker-compose.yaml 로 기동된 스택의 네트워크(`e2e-net`)
# 에 통합 이미지를 조인시켜, 파이프라인 4 AI평가 의 AGENT_LOCATION=remote 모드
# 에서 기존 Playwright Jenkins(18080) agent 로 빌드를 위임할 수 있게 한다.
#
# 사전 조건:
#   cd e2e-pipeline && docker compose up -d
#   → 네트워크 `e2e-net` 이 먼저 생성되어 있어야 한다.
#
# 사용:
#   docker compose -f docker-compose.allinone.<mac|wsl2>.yaml \
#                  -f docker-compose.allinone.e2e-bridge.yaml up -d
#
# 연동 해제:
#   docker compose -f docker-compose.allinone.<mac|wsl2>.yaml up -d   # override 미포함
# ============================================================================

services:
  ttc-allinone:
    networks:
      - ttc-net
      - e2e-net

  # GitLab 은 e2e 스택과 엮을 이유가 없으므로 확장하지 않는다.

networks:
  e2e-net:
    external: true
    name: e2e-net
